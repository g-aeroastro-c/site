name: Open Pull Request on Successful Build and Deployment

on:
  push:
    branches:
      - dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16' # Specify your Node.js version

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Run build
      - name: Run build
        run: npm run build

      # Run start (test if the app starts successfully)
      - name: Run start
        run: npm start &
      
      # Wait for the app to start and check for errors
      - name: Wait and check app health
        run: sleep 10 && curl -f http://localhost:3000 || exit 1

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Deployment step (replace with your deployment logic)
      - name: Deploy application
        run: echo "Deploying application..." # Replace with actual deployment commands

  create-pull-request:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Create a pull request
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          head: dev
          title: "Merge dev into main"
          body: "This PR merges the dev branch into the main branch after successful build, test, and deployment."